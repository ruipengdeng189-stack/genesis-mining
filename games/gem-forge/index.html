<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>宝石熔炉</title>
    <meta name="description" content="宝石熔炉 - 熔炼、合成、升阶、觉醒">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../shared/hub.css">
    <link rel="stylesheet" href="./gem-forge.css">
</head>
<body>
    <div class="gf-bg"></div>
    <div class="gf-shell">
        <header class="gf-topbar">
            <div class="gf-topline">
                <a class="back-link" href="/" id="backToHubLink">← 返回大厅</a>
                <div class="lang-toggle" role="group" aria-label="语言切换">
                    <button class="lang-btn is-active" type="button" data-lang-switch="zh" aria-pressed="true">中</button>
                    <button class="lang-btn" type="button" data-lang-switch="en" aria-pressed="false">EN</button>
                </div>
            </div>

            <section class="gf-hero-card">
                <div class="gf-hero-copy">
                    <div class="eyebrow" id="heroEyebrow">创世宝石熔炉</div>
                    <h1 id="heroTitle">宝石熔炉</h1>
                    <p id="heroSubtitle">熔炼、合成、升阶、觉醒</p>
                </div>
                <div class="gf-resource-strip" id="resourceStrip"></div>
            </section>
        </header>

        <main class="gf-main">
            <section class="gf-summary-card" id="heroSummary"></section>
            <section class="gf-panel-card">
                <div class="gf-panel-content" id="panelContent"></div>
            </section>
        </main>

        <nav class="gf-tabbar" id="tabBar" aria-label="宝石熔炉页签"></nav>

        <div class="gf-payment-modal is-hidden" id="gfPaymentModal">
            <div class="gf-payment-card">
                <div class="gf-payment-head">
                    <div>
                        <div class="eyebrow">链上支付</div>
                        <h2 id="gfPaymentTitle">宝石熔炉充值中心</h2>
                        <p id="gfPaymentDesc">创建链上订单后，使用 OKX 钱包按精确金额支付，再粘贴交易哈希（TXID）校验并发放奖励。</p>
                    </div>
                    <button class="ghost-btn icon-btn" id="gfPaymentCloseBtn" type="button" aria-label="关闭支付">&times;</button>
                </div>

                <div class="gf-payment-offer-grid" id="gfPaymentOfferGrid"></div>

                <div class="gf-payment-order-card">
                    <div class="gf-payment-order-top">
                        <div>
                            <div class="gf-payment-amount" id="gfPaymentAmount">--</div>
                            <div class="gf-payment-meta" id="gfPaymentMeta">TRON (TRC20) · OKX 钱包</div>
                        </div>
                        <div class="gf-payment-order-line">
                            <span id="gfPaymentOrderLabel">订单号</span>
                            <strong id="gfPaymentOrderId">--</strong>
                        </div>
                    </div>

                    <div class="gf-payment-order-grid">
                        <div class="gf-payment-stat">
                            <span id="gfPaymentExactLabel">精确金额</span>
                            <strong id="gfPaymentExactAmount">--</strong>
                        </div>
                        <div class="gf-payment-stat">
                            <span id="gfPaymentExpiryLabel">剩余时间</span>
                            <strong id="gfPaymentExpiry">--:--</strong>
                        </div>
                    </div>

                    <div class="gf-payment-address-block">
                        <span class="gf-mini-label" id="gfPaymentAddressLabel">收款地址</span>
                        <div class="gf-payment-address" id="gfPaymentWallet">--</div>
                    </div>

                    <div class="gf-payment-copy-row">
                        <button class="ghost-btn wide-btn" id="gfPaymentCopyAddressBtn" type="button">复制地址</button>
                        <button class="ghost-btn wide-btn" id="gfPaymentCopyAmountBtn" type="button">复制精确金额</button>
                    </div>

                    <div class="gf-payment-field">
                        <label class="gf-mini-label" for="gfPaymentTxidInput" id="gfPaymentTxidLabel">粘贴 OKX 钱包交易哈希（TXID）</label>
                        <input class="gf-payment-input" id="gfPaymentTxidInput" type="text" autocomplete="off" spellcheck="false" placeholder="请输入或粘贴链上交易哈希（TXID）">
                        <p class="gf-payment-hint" id="gfPaymentTxidHint">只有金额、地址和有效时间都匹配的订单，才能通过校验。</p>
                    </div>

                    <div class="gf-payment-status" id="gfPaymentStatus">先创建订单，再去 OKX 钱包完成支付，最后把交易哈希（TXID）粘贴到这里校验。</div>

                    <div class="gf-payment-actions">
                        <button class="primary-btn wide-btn" id="gfPaymentVerifyBtn" type="button">校验 TXID</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="gf-toast" id="toast"></div>
    </div>

    <script src="./gem-forge.config.js"></script>
    <script src="./gem-forge.js"></script>
</body>
</html>
