<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>无人机编队</title>
    <meta name="description" content="无人机编队 - 自动射击、拖拽走位、机库成长">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../shared/hub.css">
    <link rel="stylesheet" href="./drone-squad.css">
</head>
<body>
    <div class="ds-bg"></div>
    <div class="ds-shell">
        <header class="ds-topbar">
            <div class="ds-topline">
                <a class="back-link" href="/" id="backToHubLink">&larr; 返回大厅</a>
                <div class="lang-toggle" role="group" aria-label="语言切换">
                    <button class="lang-btn is-active" type="button" data-lang-switch="zh" aria-pressed="true">中</button>
                    <button class="lang-btn" type="button" data-lang-switch="en" aria-pressed="false">EN</button>
                </div>
            </div>

            <section class="ds-hero-card">
                <div class="ds-hero-copy">
                    <div class="eyebrow" id="heroEyebrow">创世无人机编队</div>
                    <h1 id="heroTitle">无人机编队</h1>
                    <p id="heroSubtitle">自动射击、拖拽走位、机库成长</p>
                </div>
                <div class="ds-resource-strip" id="resourceStrip"></div>
            </section>
        </header>

        <main class="ds-main">
            <section class="ds-summary-card" id="heroSummary"></section>
            <section class="ds-panel-card">
                <div class="ds-panel-content" id="panelContent"></div>
            </section>
        </main>

        <nav class="ds-tabbar" id="tabBar" aria-label="无人机编队页签"></nav>

        <div class="ds-modal is-hidden" id="modalRoot">
            <div class="ds-modal-card">
                <div class="ds-modal-head">
                    <div>
                        <div class="eyebrow" id="modalEyebrow">信息</div>
                        <h2 id="modalTitle">无人机编队</h2>
                        <p id="modalSubtitle"></p>
                    </div>
                    <button class="ghost-btn icon-btn" id="modalCloseBtn" type="button" aria-label="关闭弹窗">&times;</button>
                </div>
                <div class="ds-modal-body" id="modalBody"></div>
                <div class="ds-modal-actions" id="modalActions"></div>
            </div>
        </div>

        <div class="ds-modal ds-payment-modal is-hidden" id="dsPaymentModal">
            <div class="ds-payment-card">
                <div class="ds-payment-head">
                    <div>
                        <div class="eyebrow" id="dsPaymentEyebrow">链上支付</div>
                        <h2 id="dsPaymentTitle">无人机编队充值中心</h2>
                        <p id="dsPaymentDesc">创建链上订单后，在 OKX Wallet 完成支付，再粘贴 txid 校验并发放奖励。</p>
                    </div>
                    <button class="ghost-btn icon-btn" id="dsPaymentCloseBtn" type="button" aria-label="关闭支付">&times;</button>
                </div>

                <div class="ds-payment-offer-grid" id="dsPaymentOfferGrid"></div>

                <div class="ds-payment-order-card">
                    <div class="ds-payment-order-top">
                        <div>
                            <div class="ds-payment-amount" id="dsPaymentAmount">--</div>
                            <div class="ds-payment-meta" id="dsPaymentMeta">TRON (TRC20) · OKX Wallet</div>
                        </div>
                        <div class="ds-payment-order-line">
                            <span id="dsPaymentOrderLabel">订单</span>
                            <strong id="dsPaymentOrderId">--</strong>
                        </div>
                    </div>

                    <div class="ds-payment-order-grid">
                        <div class="ds-payment-stat">
                            <span id="dsPaymentExactLabel">精确金额</span>
                            <strong id="dsPaymentExactAmount">--</strong>
                        </div>
                        <div class="ds-payment-stat">
                            <span id="dsPaymentExpiryLabel">剩余时间</span>
                            <strong id="dsPaymentExpiry">--:--</strong>
                        </div>
                    </div>

                    <div class="ds-payment-address-block">
                        <span class="ds-mini-label" id="dsPaymentAddressLabel">收款地址</span>
                        <div class="ds-payment-address" id="dsPaymentWallet">--</div>
                    </div>

                    <div class="ds-payment-copy-row">
                        <button class="ghost-btn wide-btn" id="dsPaymentCopyAddressBtn" type="button">复制地址</button>
                        <button class="ghost-btn wide-btn" id="dsPaymentCopyAmountBtn" type="button">复制精确金额</button>
                    </div>

                    <div class="ds-payment-field">
                        <label class="ds-mini-label" for="dsPaymentTxidInput" id="dsPaymentTxidLabel">粘贴 OKX Wallet txid</label>
                        <input class="ds-payment-input" id="dsPaymentTxidInput" type="text" autocomplete="off" spellcheck="false" placeholder="粘贴链上 txid">
                        <p class="ds-payment-hint" id="dsPaymentTxidHint">只有金额、地址和有效时间都匹配的订单，才能通过校验。</p>
                    </div>

                    <div class="ds-payment-status" id="dsPaymentStatus">先创建订单，再去 OKX Wallet 完成支付，最后把 txid 粘贴到这里校验。</div>

                    <div class="ds-payment-actions">
                        <button class="primary-btn wide-btn" id="dsPaymentVerifyBtn" type="button">校验 TXID</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="ds-toast" id="toast"></div>
    </div>

    <script src="./drone-squad.config.js"></script>
    <script src="./drone-squad.js"></script>
</body>
</html>
