<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cipher Match</title>
    <meta name="description" content="Cipher Match - 6x6 decode puzzle runs, deck growth, research, season, and shop loop.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../shared/hub.css">
    <link rel="stylesheet" href="./cipher-match.css">
</head>
<body data-cm-tab="run">
    <div class="cm-bg" aria-hidden="true"></div>
    <div class="cm-shell">
        <header class="cm-topbar">
            <div class="cm-topline">
                <a class="back-link" href="/" id="backToHubLink">&larr; Back</a>
                <div class="lang-toggle" role="group" aria-label="Language">
                    <button class="lang-btn is-active" type="button" data-lang-switch="zh" aria-pressed="true">ZH</button>
                    <button class="lang-btn" type="button" data-lang-switch="en" aria-pressed="false">EN</button>
                </div>
            </div>

            <section class="cm-hero-card">
                <div class="cm-hero-copy">
                    <div class="eyebrow" id="heroEyebrow">Genesis · Cipher Match</div>
                    <h1 id="heroTitle">Cipher Match</h1>
                    <p id="heroSubtitle">A 6x6 decode puzzler with chapter runs, deck growth, and season loops.</p>
                </div>
                <div class="cm-resource-strip" id="resourceStrip"></div>
            </section>
        </header>

        <main class="cm-main">
            <section class="cm-summary-card" id="heroSummary"></section>
            <section class="cm-panel-card">
                <div class="cm-panel-content" id="panelContent"></div>
            </section>
        </main>

        <nav class="cm-tabbar" id="tabBar" aria-label="Cipher Match tabs"></nav>

        <div class="cm-modal is-hidden" id="modalRoot" aria-hidden="true">
            <div class="cm-modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
                <div class="cm-modal-head">
                    <div>
                        <div class="eyebrow" id="modalEyebrow">Info</div>
                        <h2 id="modalTitle">Cipher Match</h2>
                        <p id="modalSubtitle"></p>
                    </div>
                    <button class="ghost-btn icon-btn" id="modalCloseBtn" type="button" aria-label="Close modal">&times;</button>
                </div>
                <div class="cm-modal-body" id="modalBody"></div>
                <div class="cm-modal-actions" id="modalActions"></div>
            </div>
        </div>

        <div class="cm-toast" id="toast" aria-live="polite"></div>
    </div>

    <script src="./cipher-match.config.js"></script>
    <script src="./cipher-match.js"></script>
</body>
</html>
